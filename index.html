<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRACE DESIGNER</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #1a0a2e 0%, #050505 50%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Твой ник сверху */
        .nav {
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            border-bottom: 1px solid #8d43ff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nick {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #8d43ff;
        }

        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; margin: 0; line-height: 1.1; }
        .wb { color: #8d43ff; text-shadow: 0 0 25px rgba(141, 67, 255, 0.6); }

        .container { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .item {
            background: #0f0f0f;
            border-radius: 20px;
            border: 1px solid #222;
            overflow: hidden;
            transition: 0.3s;
        }

        .item:hover { border-color: #8d43ff; transform: translateY(-5px); }
        
        .item img { width: 100%; display: block; object-fit: contain; background: #000; }
        
        .info { padding: 20px; }

        .banner {
            background: linear-gradient(135deg, #0f0f0f, #1e0a3a);
            border: 2px dashed #8d43ff;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            margin-top: 60px;
        }

        .btn {
            display: inline-block;
            background: #8d43ff;
            color: #fff;
            padding: 18px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 900;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover { box-shadow: 0 0 30px #8d43ff; }

        footer { padding: 50px; text-align: center; opacity: 0.4; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="nav">
        <div class="nick">GRACE DESIGNER</div>
    </div>

    <header>
        <h1>ДИЗАЙН <br>ИНФОГРАФИКИ <br>для <span class="wb">Wildberries</span></h1>
        <p style="color: #888; margin-top: 20px;">Создаю визуал, который приносит деньги.</p>
    </header>

    <div class="container">
        <div class="grid">
            <div class="item"><img src="work1.jpg"><div class="info"><h3>Электроника</h3></div></div>
            <div class="item"><img src="work2.jpg"><div class="info"><h3>Гаджеты</h3></div></div>
            <div class="item"><img src="work3.jpg"><div class="info"><h3>Аксессуары</h3></div></div>
            <div class="item"><img src="work4.jpg"><div class="info"><h3>Для дома</h3></div></div>
            <div class="item"><img src="work5.jpg"><div class="info"><h3>Кухня</h3></div></div>
            <div class="item"><img src="work6.jpg"><div class="info"><h3>Премиум</h3></div></div>
        </div>

        <div class="banner">
            <h2>🔥 АНИМАЦИЯ</h2>
            <p>Делаю живые карточки, которые взрывают продажи.</p>
            <a href="https://t.me/GRACEINMONTMARTRE" class="btn">ЗАКАЗАТЬ</a>
        </div>
    </div>

    <footer>
        <p>© 2026 GRACE DESIGNER</p>
    </footer>

</body>
</html>
