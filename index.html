<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Design</title>
    <style>
        body { background: #0d0d0d; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        header { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #1a1a1a; text-align: center; }
        h1 { font-size: 3rem; margin: 0; color: #007bff; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; width: 320px; overflow: hidden; }
        .card img { width: 100%; display: block; }
        .card-info { padding: 15px; }
        .comp-flex { display: flex; gap: 20px; margin-top: 20px; }
        .comp-item { flex: 1; position: relative; border-radius: 10px; overflow: hidden; }
        .comp-item img { width: 100%; display: block; }
        .tag { position: absolute; top: 10px; left: 10px; padding: 5px 10px; font-weight: bold; border-radius: 5px; font-size: 12px; }
        .btn { display: inline-block; background: #24A1DE; color: #fff; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        @media (max-width: 700px) { .comp-flex { flex-direction: column; } }
    </style>
</head>
<body>
    <header>
        <h1>ДИЗАЙН КАРТОЧЕК</h1>
        <p>Продающий визуал для маркетплейсов</p>
        <a href="https://t.me/GRACEINMONTMARTRE" class="btn">ЗАКАЗАТЬ ДИЗАЙН</a>
    </header>
    <div class="container">
        <h2>Мои работы</h2>
        <div class="grid">
            <div class="card"><img src="work1.jpg"><div class="card-info"><h3>Электроника</h3></div></div>
            <div class="card"><img src="work2.jpg"><div class="card-info"><h3>Инфографика</h3></div></div>
            <div class="card"><img src="work3.jpg"><div class="card-info"><h3>Товары для дома</h3></div></div>
        </div>
    </div>
    <div class="container">
        <h2>До / После</h2>
        <div class="comp-flex">
            <div class="comp-item"><span class="tag" style="background: red;">ДО</span><img src="before1.jpg"></div>
            <div class="comp-item"><span class="tag" style="background: green;">ПОСЛЕ</span><img src="after1.jpg"></div>
        </div>
    </div>
    <footer style="text-align: center; padding: 50px; opacity: 0.5;">
        <p>TG: @GRACEINMONTMARTRE</p>
    </footer>
</body>
</html>
