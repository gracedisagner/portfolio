<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дизайн фото для маркетплейсов | Портфолио</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-color: #007bff; 
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Шапка */
        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
            padding: 20px;
        }

        h1 {
            font-size: clamp(2.2rem, 8vw, 4.5rem);
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .accent {
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(0, 123, 255, 0.4);
        }

        .hero-desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin-top: 20px;
        }

        /* Контейнер */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 40px;
            border-left: 5px solid var(--accent-color);
            padding-left: 15px;
        }

        /* Сетка работ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .portfolio-item {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .portfolio-item img {
            width: 100%;
            display: block;
        }

        .item-info {
            padding: 15px;
        }

        /* БЛОК ДО / ПОСЛЕ (Простой вариант) */
        .comparison-simple {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .comp-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }
