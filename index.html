<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дизайн фото для маркетплейсов | Портфолио</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-color: #007bff; 
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Шапка */
        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
            padding: 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .accent {
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(0, 123, 255, 0.4);
        }

        .hero-desc {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin-top: 20px;
        }

        /* Сетка портфолио */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 40px;
            border-left: 5px solid var(--accent-color);
            padding-left: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .portfolio-item {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.4s ease, border-color 0.4s ease;
        }

        .portfolio-item:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
        }

        .portfolio-item img {
            width: 100%;
            display: block;
        }

        .item-info {
            padding: 20px;
        }

        .item-info h3 {
            margin: 0;
            font-size: 1.2rem;
        }

        .item-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 10px 0 0 0;
        }

        /* СТИЛИ СЛАЙДЕРА */
        .comparison-slider {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 20px;
            border: 2px solid #333;
            cursor: ew-resize;
            user-select: none;
            touch-action: pan-y;
        }

        .comparison-slider img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .img-after {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
        }

        .img-before {
            z-index: 1;
            filter: grayscale(0.4);
        }
