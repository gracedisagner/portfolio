<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRACE DESIGNER | Портфолио</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        :root {
            --bg-dark: #050505;
            --card-bg: #0f0f0f;
            --wb-color: #8d43ff; 
            --text-main: #ffffff;
            --text-secondary: #888;
        }

        /* ФОН С ЖИВОЙ СЕТКОЙ */
        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(141, 67, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(141, 67, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* НЕОНОВЫЕ БЛИКИ ПО БОКАМ */
        .glow {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(141, 67, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
            pointer-events: none;
            animation: pulse 10s infinite alternate;
        }
        .glow-1 { top: -10%; left: -15%; }
        .glow-2 { bottom: -10%; right: -15%; }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.1); }
        }

        /* НАВИГАЦИЯ С НИКОМ */
        .navbar {
            padding: 20px;
            text-align: center;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(141, 67, 255, 0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
