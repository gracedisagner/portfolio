<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дизайн Портфолио</title>
    <style>
        body { 
            background-color: #0d0d0d; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            text-align: center; 
        }
        header { padding: 100px 20px; background: #1a1a1a; }
        .container { max-width: 1000px; margin: 0 auto; padding: 50px 20px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .item { background: #222; border-radius: 10px; width: 300px; padding: 10px; border: 1px solid #333; }
        img { width: 100%; border-radius: 8px; display: block; background: #333; }
        .comp-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .comp-box { width: 45%; position: relative; }
        .badge { position: absolute; top: 10px; left: 10px; padding: 5px; font-weight: bold; border-radius: 4px; }
        .btn { display: inline-block; background: #007bff; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; margin-top: 20px; }
        @media (max-width: 600px) { .comp-container { flex-direction: column; align-items: center; } .comp-box { width: 90%; } }
    </style>
</head>
<body>

    <header>
        <h1>ДИЗАЙН ФОТОГРАФИЙ</h1>
        <p>Портфолио для маркетплейсов</p>
        <a href="https://t.me/GRACEINMONTMARTRE" class="btn">Заказать проект</a>
    </header>

    <div class="container">
        <h2>Мои работы</h2>
        <div class="grid">
            <div class="item"><img src="work1.jpg" alt="Работа 1"><h3>Проект 1</h3></div>
            <div class="item"><img src="work2.jpg" alt="Работа 2"><h3>Проект 2</h3></div>
            <div class="item"><img src="work3.jpg" alt="Работа 3"><h3>Проект 3</h3></div>
        </div>
    </div>

    <div class="container">
        <h2>До / После</h2>
        <div class="comp-container">
            <div class="comp-box">
                <span class="badge" style="background: red;">ДО</span>
                <img src="before1.jpg">
            </div>
            <div class="comp-box">
                <span class="badge" style="background: green;">ПОСЛЕ</span>
                <img src="after1.jpg">
            </div>
        </div>
    </div>

    <footer style="padding: 50px;">
        <p>Telegram: @GRACEINMONTMARTRE</p>
    </footer>

</body>
</html>
