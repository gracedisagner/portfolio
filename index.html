<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дизайн фото для маркетплейсов | Портфолио</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-color: #007bff; 
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Шапка */
        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
            padding: 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1;
        }

        .accent {
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(0, 123, 255, 0.4);
        }

        .hero-desc {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin-top: 25px;
        }

        /* Сетка портфолио */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 40px;
            border-left: 5px solid var(--accent-color);
            padding-left: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .portfolio-item {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .portfolio-item:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.2);
        }

        .portfolio-item img {
            width: 100%;
            display: block;
            aspect-ratio: 3 / 4;
            object-fit: cover;
        }

        .item-info {
            padding: 25px;
        }

        .item-info h3 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .item-info p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 10px 0 0 0;
        }

        /* Результаты До / После */
        .comparison-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .comp-box {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #222;
        }

        .comp-box img {
            width: 100%;
            display: block;
        }

        .label {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 6px 15px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .label-before { background: #ff4d4d; color: #fff; }
        .label-after { background: #00ff88; color: #000; }

        /* Футер */
        footer {
            padding: 100px 20px;
            text-align: center;
            background: #0a0a0a;
            border-top: 1px solid #1a1a1a;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--accent-color);
            color: white;
            padding: 20px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        .cta-button:hover {
            box-shadow: 0 0 40px rgba(0, 123, 255, 0.5);
            transform: scale(1.05);
        }
